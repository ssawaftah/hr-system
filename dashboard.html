<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR System Dashboard</title>

  <link rel="stylesheet" href="./styles/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar"></div>

  <!-- CONTENT -->
  <div class="content">
    <div id="app">جاري التحميل...</div>
  </div>

</div>

<!-- =========================
     MAIN SCRIPT
========================= -->

<script type="module">

import { loadUser } from "./core/state.js";
import { logout } from "./core/auth.js";
import { can } from "./core/permissions.js";

/* =========================
   MODULES
========================= */

import { renderEmployees } from "./modules/employees.js";
import { renderRequests } from "./modules/requests.js";
import { renderAttendance } from "./modules/attendance.js";
import { renderPayrollUI } from "./modules/payroll.js";
import { renderAnnouncements } from "./modules/announcements.js";
import { renderAudit } from "./modules/audit.js";

/* =========================
   INIT USER
========================= */

const user = loadUser();

if (!user) {
  location.href = "index.html";
}

/* =========================
   MENU BUILD (RBAC)
========================= */

const menu = [];

menu.push({ key: "home", label: "🏠 الرئيسية" });

if (can("employees.read")) {
  menu.push({ key: "employees", label: "👥 الموظفين" });
}

if (can("requests.read")) {
  menu.push({ key: "requests", label: "📄 الطلبات" });
}

if (can("attendance.read")) {
  menu.push({ key: "attendance", label: "⏱ الحضور" });
}

if (can("payroll.read")) {
  menu.push({ key: "payroll", label: "💰 الرواتب" });
}

if (can("announcements.read")) {
  menu.push({ key: "announcements", label: "📢 الإعلانات" });
}

if (can("audit.read")) {
  menu.push({ key: "audit", label: "🧾 السجل" });
}

/* =========================
   RENDER SIDEBAR
========================= */

const sidebar = document.getElementById("sidebar");

sidebar.innerHTML = `
  <h2>🏢 HR System</h2>

  <div class="card">
    <b>${user.name}</b><br/>
    <small>${user.role}</small>
  </div>

  ${menu.map(m => `
    <div class="menu-item" onclick="navigate('${m.key}')">
      ${m.label}
    </div>
  `).join("")}

  <div class="menu-item" onclick="logoutUser()">
    🚪 تسجيل خروج
  </div>
`;

/* =========================
   NAVIGATION SYSTEM
========================= */

window.navigate = async function(page) {

  const app = document.getElementById("app");

  app.innerHTML = "جاري التحميل...";

  /* ===== GUARDS ===== */
  if (page === "employees" && !can("employees.read")) return;
  if (page === "requests" && !can("requests.read")) return;
  if (page === "attendance" && !can("attendance.read")) return;
  if (page === "payroll" && !can("payroll.read")) return;
  if (page === "audit" && !can("audit.read")) return;

  /* ===== ROUTES ===== */

  if (page === "home") {
    app.innerHTML = `
      <div class="card">
        <h2>مرحباً 👋</h2>
        <p>أهلاً بك في نظام الموارد البشرية</p>
      </div>
    `;
  }

  if (page === "employees") {
    await renderEmployees("app");
  }

  if (page === "requests") {
    await renderRequests("app", user);
  }

  if (page === "attendance") {
    await renderAttendance("app");
  }

  if (page === "payroll") {
    await renderPayrollUI("app");
  }

  if (page === "announcements") {
    await renderAnnouncements("app", user.employeeId);
  }

  if (page === "audit") {
    await renderAudit("app");
  }
};

/* =========================
   LOGOUT
========================= */

window.logoutUser = function () {
  logout();
};

/* =========================
   DEFAULT PAGE
========================= */

navigate("home");

</script>

</body>
</html>
