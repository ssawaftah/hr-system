<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>الطلبات</title>
  <link rel="stylesheet" href="./css/app.css?v=my-requests-final-1" />

  <style>
    body {
      background: #f7f9fc;
    }

    .requests-page {
      max-width: 980px;
      margin: 0 auto;
      padding-bottom: 95px;
    }

    .requests-employee-hero {
      background: linear-gradient(135deg, #4f9af4, #3f86df);
      color: #fff;
      border-radius: 0 0 34px 34px;
      margin: -16px -16px 32px;
      padding: 28px 24px;
      display: flex;
      align-items: center;
      gap: 20px;
      box-shadow: 0 18px 45px rgba(63, 134, 223, 0.22);
    }

    .requests-avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #dbeafe;
      display: grid;
      place-items: center;
      font-size: 58px;
      border: 5px solid rgba(255, 255, 255, 0.55);
      flex: 0 0 auto;
    }

    .requests-hero-info {
      flex: 1;
    }

    .requests-hero-info h2 {
      margin: 0 0 12px;
      color: #fff;
      font-size: 26px;
      font-weight: 900;
      line-height: 1.5;
    }

    .requests-hero-info p {
      margin: 8px 0;
      color: #fff;
      font-size: 20px;
      font-weight: 900;
    }

    .requests-hero-info b {
      color: #ff3b30;
      font-weight: 900;
    }

    .main-requests-btn {
      display: block;
      width: min(680px, 100%);
      margin: 26px auto 44px;
      border: none;
      border-radius: 18px;
      background: #4f9af4;
      color: #fff;
      padding: 22px;
      font-size: 26px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(79, 154, 244, 0.25);
    }

    .request-types-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
      margin-top: 24px;
    }

    .request-type-card {
      min-height: 170px;
      border: 4px solid #4f9af4;
      border-radius: 22px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      cursor: pointer;
      transition: 0.2s ease;
      color: #111;
      font-size: 23px;
      font-weight: 900;
      text-align: center;
    }

    .request-type-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 18px 44px rgba(79, 154, 244, 0.18);
    }

    .request-icon {
      font-size: 48px;
      line-height: 1;
      color: #4f9af4;
    }

    .requests-list-screen {
      display: none;
    }

    .requests-list-screen.is-active {
      display: block;
    }

    .requests-home-screen.is-hidden {
      display: none;
    }

    .back-btn {
      border: none;
      background: #fff;
      color: #111;
      border-radius: 16px;
      padding: 12px 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 8px 26px rgba(20, 32, 60, 0.08);
      margin-bottom: 14px;
    }

    .requests-filter-card {
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      margin: 18px 0 26px;
      box-shadow: 0 10px 35px rgba(20, 32, 60, 0.10);
      border: 1px solid #e7ebf3;
    }

    .requests-filter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .requests-filter-grid label {
      display: block;
      color: #8aa7d8;
      font-weight: 900;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .requests-filter-grid select {
      width: 100%;
      border: 3px solid #4f9af4;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 22px;
      background: #fff;
      outline: none;
    }

    .show-results-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 18px;
      background: linear-gradient(135deg, #4f9af4, #2f86ee);
      color: #fff;
      font-weight: 900;
      font-size: 24px;
      cursor: pointer;
    }

    .requests-table-wrap {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid #222;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.07);
    }

    .requests-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
    }

    .requests-table th,
    .requests-table td {
      border: 2px solid #333;
      padding: 13px 10px;
      text-align: center;
      font-size: 21px;
      vertical-align: middle;
      word-break: break-word;
    }

    .requests-table th {
      background: #f7fbff;
      font-weight: 900;
    }

    .view-request-btn {
      border: none;
      background: #4f9af4;
      color: #fff;
      border-radius: 10px;
      padding: 10px 15px;
      font-size: 20px;
      cursor: pointer;
      font-weight: 900;
    }

    .empty-box {
      background: #fff;
      border-radius: 20px;
      padding: 26px;
      text-align: center;
      font-size: 20px;
      color: #777;
      border: 1px solid #e7ebf3;
    }

    .request-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(18, 20, 28, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .request-modal.is-open {
      display: flex;
    }

    .request-modal-card {
      width: min(720px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: #fff;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
    }

    .request-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .request-modal-head h2 {
      margin: 0;
      font-size: 26px;
      font-weight: 900;
    }

    .close-modal-btn {
      border: none;
      background: #f1f3f8;
      border-radius: 14px;
      padding: 11px 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .details-grid-local {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-box-local {
      background: #f8faff;
      border: 1px solid #e4e9f4;
      border-radius: 16px;
      padding: 14px;
    }

    .detail-box-local span {
      display: block;
      color: #777;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .detail-box-local strong {
      display: block;
      font-size: 18px;
      color: #111;
      line-height: 1.7;
    }

    .request-submit-message {
      margin-top: 12px;
      font-weight: 900;
    }

    .request-submit-message.ok {
      color: #24a148;
    }

    .request-submit-message.err {
      color: #d93025;
    }

    .requests-debug-note {
      margin-top: 12px;
      font-size: 13px;
      color: #777;
      word-break: break-word;
    }

    @media (max-width: 760px) {
      .requests-page {
        padding: 0 10px 95px;
      }

      .requests-employee-hero {
        margin: -14px -14px 24px;
        padding: 22px 16px;
      }

      .requests-avatar {
        width: 86px;
        height: 86px;
        font-size: 44px;
      }

      .requests-hero-info h2 {
        font-size: 20px;
      }

      .requests-hero-info p {
        font-size: 16px;
      }

      .main-requests-btn {
        font-size: 22px;
        padding: 18px;
      }

      .request-types-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .request-type-card {
        min-height: 145px;
        font-size: 19px;
        border-width: 3px;
      }

      .request-icon {
        font-size: 40px;
      }

      .requests-filter-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .requests-filter-grid label {
        font-size: 18px;
      }

      .requests-filter-grid select {
        font-size: 19px;
        padding: 13px;
      }

      .show-results-btn {
        font-size: 21px;
      }

      .requests-table th,
      .requests-table td {
        font-size: 17px;
        padding: 10px 6px;
      }

      .view-request-btn {
        font-size: 16px;
        padding: 8px 11px;
      }

      .details-grid-local {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="apple-system-ui">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="brand-mark">HR</span>
        <span>نظام الموارد البشرية</span>
      </div>
      <nav class="sidebar-menu"></nav>
    </aside>

    <main class="main-content page-shell requests-page">
      <header class="topbar">

              <label for="statusFilter">الحالة</label>

                <option value="all">الكل</option>

  </div>

  <div id="requestFormModal" class="request-modal">
    <div class="request-modal-card">
      <div class="request-modal-head">
        <h2 id="requestFormTitle">طلب جديد</h2>

      <form id="requestForm" class="form-grid two">
        <div id="dynamicFields" class="form-grid two full-width"></div>

          <input id="reqReason" required />

      <p id="requestMsg" class="request-submit-message"></p>

  </div>

  <div id="requestDetailsModal" class="request-modal">
    <div class="request-modal-card">
      <div class="request-modal-head">
        <h2>تفاصيل الطلب</h2>
        <button id="closeDetailsModal" class="close-modal-btn">إغلاق</button>
      </div>

      <div id="requestDetailsContent" class="details-grid-local"></div>
    </div>
  </div>

  <script src="./js/navigation-config.js?v=my-requests-final-1"></script>
  <script src="./js/auth-guard.js?v=my-requests-final-1"></script>

  <script>
    const $ = (id) => document.getElementById(id);

    const LOCAL_KEY = "hr_employee_requests_local_echo_v2";
    let currentType = "leave";
    let allRequests = [];

    const typeLabels = {
      leave: "الإجازات",
      exit: "المغادرة",
      overtime: "العمل الإضافي",
      advance: "السلف",
      complaint: "الشكاوى",
      resignation: "الاستقالة",
      custom_allowance: "المخصصات",
      custom: "طلبات أخرى"
    };

    const cardTypeLabels = {
      leave: "طلب إجازة",
      exit: "طلب مغادرة",
      overtime: "طلب عمل إضافي",
      advance: "طلب سلفة",
      complaint: "طلب شكوى",
      resignation: "طلب استقالة",
      custom_allowance: "مخصصات أخرى",
      custom: "طلبات أخرى"
    };

    const statusLabels = {
      pending: "قيد الانتظار",
      approved: "موافق عليه",
      rejected: "مرفوض",
      cancelled: "ملغي",
      needs_info: "يحتاج معلومات",
      draft: "مسودة"
    };

    function apiBase() {
      return window.API_BASE_URL || "https://hr-system-backend-dxj2.onrender.com/api";
    }

    function authToken() {
      return window.token || localStorage.getItem("token");
    }

    async function api(path, options = {}) {
      const response = await fetch(apiBase() + path, {
        ...options,
        headers: {
          Authorization: "Bearer " + authToken(),
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || "فشل الاتصال بالسيرفر");
      }

      return data;
    }

    function formatDate(value) {
      return value ? String(value).slice(0, 10) : "-";
    }

    function safe(value, fallback = "-") {
      return value === undefined || value === null || value === "" ? fallback : String(value);
    }

    function readLocalRequests() {
      try {
        return JSON.parse(localStorage.getItem(LOCAL_KEY) || "[]");
      } catch (_) {
        return [];
      }
    }

    function saveLocalRequest(row) {
      const rows = readLocalRequests();
      const key = String(row.id || row.local_id);

      if (!rows.some((item) => String(item.id || item.local_id) === key)) {
        rows.unshift(row);
      }

      localStorage.setItem(LOCAL_KEY, JSON.stringify(rows.slice(0, 50)));
    }

    function requestYear(row) {
      const raw = row.created_at || row.submitted_at || "";
      const year = String(raw).slice(0, 4);
      return /^\d{4}$/.test(year) ? year : String(new Date().getFullYear());
    }

    function requestType(row) {
      return row.request_type || "custom";
    }

    function requestStatus(row) {
      return row.status || "pending";
    }

function calculateDays(from, to) {
  if (!from || !to) return "-";
  const start = new Date(from);
  const end = new Date(to);
  if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return "-";
  const diff = Math.floor((end - start) / 86400000) + 1;
  return diff > 0 ? `${diff} يوم` : "-";
}

function leaveTypeLabel(value) {
  return {
    annual: "سنوية",
    sick: "مرضية",
    emergency: "طارئة",
    unpaid: "بدون راتب"
  }[value] || value || "-";
}

function exitTypeLabel(value) {
  return {
    personal: "شخصية",
    work: "عمل",
    medical: "طبية"
  }[value] || value || "-";
}

function deductionMethodLabel(value) {
  return {
    one_time: "مرة واحدة",
    installments: "أقساط"
  }[value] || value || "-";
}

function requestDetailBoxes(row) {
  const data = row.request_data || {};
  const type = requestType(row);

  if (type === "leave") {
    return [
      detailBox("من تاريخ", data.start_date || "-"),
      detailBox("إلى تاريخ", data.end_date || "-"),
      detailBox("المدة", calculateDays(data.start_date, data.end_date)),
      detailBox("نوع الإجازة", leaveTypeLabel(data.leave_type)),
      detailBox("السبب", data.reason || "-"),
      detailBox("الحالة", statusLabels[requestStatus(row)] || requestStatus(row))
    ].join("");
  }

  if (type === "exit") {
    return [
      detailBox("تاريخ المغادرة", data.exit_date || "-"),
      detailBox("وقت المغادرة", data.exit_time || "-"),
      detailBox("وقت العودة", data.return_time || "-"),
      detailBox("نوع المغادرة", exitTypeLabel(data.exit_type)),
      detailBox("السبب", data.reason || "-"),
      detailBox("الحالة", statusLabels[requestStatus(row)] || requestStatus(row))
    ].join("");
  }

  if (type === "advance") {
    return [
      detailBox("المبلغ", data.amount ? `${Number(data.amount).toFixed(2)}` : "-"),
      detailBox("طريقة الخصم", deductionMethodLabel(data.deduction_method)),
      detailBox("عدد الأقساط", data.installments_count || "-"),
      detailBox("شهر بداية الخصم", data.deduction_start_month || "-"),
      detailBox("السبب", data.reason || "-"),
      detailBox("الحالة", statusLabels[requestStatus(row)] || requestStatus(row))
    ].join("");
  }

  if (type === "overtime") {
    return [
      detailBox("التاريخ", data.overtime_date || "-"),
      detailBox("من الساعة", data.from_time || "-"),
      detailBox("إلى الساعة", data.to_time || "-"),
      detailBox("السبب", data.reason || "-"),
      detailBox("ملاحظات", data.notes || "-"),
      detailBox("الحالة", statusLabels[requestStatus(row)] || requestStatus(row))
    ].join("");
  }

  if (type === "resignation") {
    return [
      detailBox("آخر يوم عمل", data.last_working_day || "-"),
      detailBox("السبب", data.reason || "-"),
      detailBox("ملاحظات", data.notes || "-"),
      detailBox("الحالة", statusLabels[requestStatus(row)] || requestStatus(row))
    ].join("");
  }

  return [
    detailBox("العنوان", data.title || row.request_title || "-"),
    detailBox("السبب", data.reason || "-"),
    detailBox("التفاصيل", data.details || data.notes || "-"),
    detailBox("الحالة", statusLabels[requestStatus(row)] || requestStatus(row))
  ].join("");
}

    function requestFields(type) {
      if (type === "leave") {
        return `
          <div class="field-shell">
            <label class="field-label">نوع الإجازة</label>
            <select id="reqLeaveType">
              <option value="annual">سنوية</option>
              <option value="sick">مرضية</option>
              <option value="emergency">طارئة</option>
              <option value="unpaid">بدون راتب</option>
            </select>
          </div>
          <div class="field-shell">
            <label class="field-label">من تاريخ</label>
            <input type="date" id="reqStart" required />
          </div>
          <div class="field-shell">
            <label class="field-label">إلى تاريخ</label>
            <input type="date" id="reqEnd" required />
          </div>
        `;
      }

      if (type === "exit") {
        return `
          <div class="field-shell">
            <label class="field-label">نوع المغادرة</label>
            <select id="reqExitType">
              <option value="personal">شخصية</option>
              <option value="work">عمل</option>
              <option value="medical">طبية</option>
            </select>
          </div>
          <div class="field-shell">
            <label class="field-label">التاريخ</label>
            <input type="date" id="reqExitDate" required />
          </div>
          <div class="field-shell">
            <label class="field-label">وقت المغادرة</label>
            <input type="time" id="reqExitTime" required />
          </div>
          <div class="field-shell">
            <label class="field-label">وقت العودة</label>
            <input type="time" id="reqReturnTime" />
          </div>
        `;
      }

      if (type === "advance") {
        return `
          <div class="field-shell">
            <label class="field-label">المبلغ</label>
            <input type="number" id="reqAmount" min="1" step="0.01" required />
          </div>
          <div class="field-shell">
            <label class="field-label">طريقة الخصم</label>
            <select id="reqDeduction">
              <option value="one_time">مرة واحدة</option>
              <option value="installments">أقساط</option>
            </select>
          </div>
          <div class="field-shell">
            <label class="field-label">عدد الأقساط</label>
            <input type="number" id="reqInstallments" min="1" value="1" />
          </div>
          <div class="field-shell">
            <label class="field-label">شهر بداية الخصم</label>
            <input type="month" id="reqStartMonth" required />
          </div>
        `;
      }

      if (type === "overtime") {
        return `
          <div class="field-shell">
            <label class="field-label">التاريخ</label>
            <input type="date" id="reqOvertimeDate" required />
          </div>
          <div class="field-shell">
            <label class="field-label">من الساعة</label>
            <input type="time" id="reqFromTime" required />
          </div>
          <div class="field-shell">
            <label class="field-label">إلى الساعة</label>
            <input type="time" id="reqToTime" required />
          </div>
        `;
      }

      if (type === "resignation") {
        return `
          <div class="field-shell">
            <label class="field-label">آخر يوم عمل</label>
            <input type="date" id="reqLastWorkingDay" required />
          </div>
        `;
      }

      return `
        <div class="field-shell full-width">
          <label class="field-label">عنوان الطلب</label>
          <input id="reqTitle" required />
        </div>
      `;
    }

    function buildPayload(type) {
      const reason = $("reqReason")?.value || "";
      const notes = $("reqDetails")?.value || "";

      if (type === "leave") {
        return {
          leave_type: $("reqLeaveType")?.value || "annual",
          start_date: $("reqStart")?.value,
          end_date: $("reqEnd")?.value,
          reason,
          notes
        };
      }

      if (type === "exit") {
        return {
          exit_type: $("reqExitType")?.value || "personal",
          exit_date: $("reqExitDate")?.value,
          exit_time: $("reqExitTime")?.value,
          return_time: $("reqReturnTime")?.value,
          reason,
          notes
        };
      }

      if (type === "advance") {
        return {
          amount: Number($("reqAmount")?.value || 0),
          deduction_method: $("reqDeduction")?.value || "one_time",
          installments_count: Number($("reqInstallments")?.value || 1),
          deduction_start_month: $("reqStartMonth")?.value,
          reason,
          notes
        };
      }

      if (type === "overtime") {
        return {
          title: "طلب عمل إضافي",
          details: `${reason} ${notes}`.trim() || "طلب عمل إضافي",
          overtime_date: $("reqOvertimeDate")?.value,
          from_time: $("reqFromTime")?.value,
          to_time: $("reqToTime")?.value,
          reason,
          notes
        };
      }

      if (type === "resignation") {
        return {
          last_working_day: $("reqLastWorkingDay")?.value,
          reason,
          notes
        };
      }

      return {
        title: $("reqTitle")?.value || cardTypeLabels[type] || "طلب",
        details: notes || reason || cardTypeLabels[type] || "طلب",
        reason,
        notes
      };
    }

    function apiRequestType(type) {
      if (type === "overtime") return "custom";
      if (type === "custom_allowance") return "custom";
      return type;
    }

    async function fetchRequests() {
      let serverRows = [];
      const errors = [];

      try {
        const data = await api("/employee-portal/requests");
        serverRows = data.requests || [];
      } catch (error) {
        errors.push("/employee-portal/requests: " + error.message);
      }

      if (!serverRows.length) {
        try {
          const data = await api("/leaves");
          serverRows = data.requests || data.leaves || [];
        } catch (error) {
          errors.push("/leaves: " + error.message);
        }
      }

      const merged = [...readLocalRequests(), ...serverRows];
      const seen = new Set();

      allRequests = merged.filter((row) => {
        const key = String(row.id || row.local_id || `${row.request_type}-${row.created_at}`);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      return errors;
    }

    function fillYearFilter() {
      const yearFilter = $("yearFilter");
      const currentYear = new Date().getFullYear();

      const years = new Set([String(currentYear)]);

      allRequests.forEach((row) => {
        years.add(requestYear(row));
      });

      const sortedYears = Array.from(years).sort((a, b) => Number(b) - Number(a));

      yearFilter.innerHTML = sortedYears.map((year) => {
        return `<option value="${year}">${year}</option>`;
      }).join("");

      yearFilter.value = String(currentYear);
    }

    function filterRequests() {
      const selectedYear = $("yearFilter").value;
      const selectedStatus = $("statusFilter").value;

      return allRequests.filter((row) => {
        const matchesYear = requestYear(row) === selectedYear;
        const matchesStatus = selectedStatus === "all" || requestStatus(row) === selectedStatus;
        return matchesYear && matchesStatus;
      });
    }

    function renderRequestsTable() {
      const box = $("requestsResultBox");
      const rows = filterRequests();

      if (!rows.length) {
        box.innerHTML = `<div class="empty-box">لا توجد طلبات ضمن الفلترة الحالية</div>`;
        return;
      }

      box.innerHTML = `
        <div class="requests-table-wrap">
          <table class="requests-table">
            <thead>
              <tr>
                <th>التاريخ</th>
                <th>النوع</th>
                <th>الحالة</th>
                <th>عرض</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row, index) => `
                <tr>
                  <td>${formatDate(row.created_at || row.submitted_at)}</td>
                  <td>${typeLabels[requestType(row)] || safe(row.request_title, "طلب")}</td>
                  <td>${statusLabels[requestStatus(row)] || requestStatus(row)}</td>
                  <td>
                    <button class="view-request-btn" type="button" data-row-index="${index}">
                      💬
                    </button>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;

      box.querySelectorAll("[data-row-index]").forEach((button) => {
        button.addEventListener("click", () => {
          const row = rows[Number(button.dataset.rowIndex)];
          showDetails(row);
        });
      });
    }

    function detailBox(label, value) {
      return `
        <div class="detail-box-local">
          <span>${label}</span>
          <strong>${safe(value)}</strong>
        </div>
      `;
    }

    function showDetails(row) {
  $("requestDetailsContent").innerHTML = [
    detailBox("نوع الطلب", typeLabels[requestType(row)] || row.request_title || "طلب"),
    detailBox("تاريخ التقديم", formatDate(row.created_at || row.submitted_at)),
    requestDetailBoxes(row)
  ].join("");

  $("requestDetailsModal").classList.add("is-open");
}

    function openRequestForm(type) {
      currentType = type;
      $("requestFormTitle").textContent = cardTypeLabels[type] || "طلب جديد";
      $("dynamicFields").innerHTML = requestFields(type);
      $("requestMsg").textContent = "";
      $("requestMsg").className = "request-submit-message";
      $("requestFormModal").classList.add("is-open");
    }

    function showRequestsList() {
      $("requestsHomeScreen").classList.add("is-hidden");
      $("requestsListScreen").classList.add("is-active");
    }

    function showRequestsHome() {
      $("requestsHomeScreen").classList.remove("is-hidden");
      $("requestsListScreen").classList.remove("is-active");
    }

    async function loadEmployeeHero() {
      try {
        const data = await api("/employee-portal/profile");
        const profile = data.profile || {};

        $("employeeNameHero").textContent = profile.full_name || "الموظف";
        $("employeeNumberHero").textContent = profile.employee_number || "-";
        $("employeeJobHero").textContent =
          profile.job_title_label ||
          profile.job_title_name ||
          profile.job_title ||
          "موظف";
      } catch (_) {}
    }

    async function reloadRequestsAndRender() {
      $("requestsResultBox").innerHTML = `<div class="empty-box">جاري تحميل الطلبات...</div>`;
      const errors = await fetchRequests();
      fillYearFilter();
      renderRequestsTable();

      if (errors.length) {
        $("requestsDebugNote").textContent = "ملاحظات الاتصال: " + errors.join(" / ");
      } else {
        $("requestsDebugNote").textContent = "";
      }
    }

    async function initPage() {
      if (typeof window.loadLoggedUser === "function") {
        await window.loadLoggedUser();
      }

      await loadEmployeeHero();
      await reloadRequestsAndRender();

      $("openRequestsListBtn").addEventListener("click", async () => {
        showRequestsList();
        await reloadRequestsAndRender();
      });

      $("backToRequestsHome").addEventListener("click", showRequestsHome);

      $("showResultsBtn").addEventListener("click", renderRequestsTable);

      $("closeRequestFormModal").addEventListener("click", () => {
        $("requestFormModal").classList.remove("is-open");
      });

      $("closeDetailsModal").addEventListener("click", () => {
        $("requestDetailsModal").classList.remove("is-open");
      });

      document.querySelectorAll("[data-type]").forEach((button) => {
        button.addEventListener("click", () => openRequestForm(button.dataset.type));
      });

      $("requestForm").addEventListener("submit", async (event) => {
        event.preventDefault();

        const msg = $("requestMsg");
        const dataPayload = buildPayload(currentType);
        const typeForApi = apiRequestType(currentType);

        const localRow = {
          local_id: "local-" + Date.now(),
          id: "local-" + Date.now(),
          request_type: currentType,
          request_title: cardTypeLabels[currentType] || "طلب",
          request_data: dataPayload,
          status: "pending",
          created_at: new Date().toISOString(),
          submitted_at: new Date().toISOString()
        };

        msg.textContent = "جاري إرسال الطلب...";
        msg.className = "request-submit-message";

        try {
          const response = await api("/leaves", {
            method: "POST",
            body: JSON.stringify({
              request_type: typeForApi,
              status: "pending",
              request_data: dataPayload
            })
          });

          saveLocalRequest(response.request || localRow);

          msg.textContent = "تم إرسال الطلب بنجاح وتمت إضافته إلى طلباتي";
          msg.className = "request-submit-message ok";
        } catch (error) {
          saveLocalRequest(localRow);

          msg.textContent = "تمت إضافة الطلب إلى طلباتي محليًا، لكن ظهر خطأ اتصال: " + error.message;
          msg.className = "request-submit-message err";
        }

        event.target.reset();

        setTimeout(async () => {
          $("requestFormModal").classList.remove("is-open");
          showRequestsList();
          await reloadRequestsAndRender();
        }, 650);
      });
    }

    initPage();
  </script>
</body>
</html>
