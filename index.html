<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HR Login</title>
<style>
body{font-family:Arial;background:#f5f5f7;display:flex;justify-content:center;align-items:center;height:100vh;direction:rtl}
.box{background:#fff;padding:20px;border-radius:12px;width:320px}
input{width:100%;padding:10px;margin:8px 0}
button{width:100%;padding:10px;background:#0071e3;color:#fff;border:none}
</style>
</head>
<body>

<div class="box">
<h3>HR System</h3>
<input id="id" placeholder="رقم الموظف">
<input id="pass" type="password" placeholder="كلمة السر">
<button onclick="login()">دخول</button>
</div>

<script type="module">
import { db } from "./firebase-config.js";
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

window.login = async function(){

const id = document.getElementById("id").value;
const pass = document.getElementById("pass").value;

const q = query(
  collection(db,"users"),
  where("employeeId","==",id),
  where("password","==",pass)
);

const snap = await getDocs(q);

if(snap.empty){
  alert("خطأ");
  return;
}

const user = snap.docs[0].data();

sessionStorage.setItem("user", JSON.stringify(user));

location.href="dashboard.html";

};
</script>

</body>
</html>
