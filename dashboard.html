<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>

<body>

<div class="container">

  <div class="sidebar" id="sidebar"></div>

  <div class="content">
    <div id="app">جاري التحميل...</div>
  </div>

</div>

<script type="module">

/* =========================
   SAFE INIT (NO IMPORTS)
========================= */

console.log("🔥 Dashboard Loaded");

/* fake user (اختبار) */
const user = {
  name: "Admin",
  role: "admin",
  employeeId: "1001"
};

/* =========================
   MENU
========================= */

const sidebar = document.getElementById("sidebar");

sidebar.innerHTML = `
  <h2>🏢 HR</h2>

  <div class="card">
    <b>${user.name}</b><br/>
    <small>${user.role}</small>
  </div>

  <div class="menu-item" onclick="navigate('home')">🏠 الرئيسية</div>
  <div class="menu-item" onclick="navigate('employees')">👥 الموظفين</div>
  <div class="menu-item" onclick="navigate('requests')">📄 الطلبات</div>
`;

/* =========================
   NAVIGATION
========================= */

window.navigate = function(page) {

  const app = document.getElementById("app");

  console.log("Go to:", page);

  if (page === "home") {
    app.innerHTML = "🔥 الصفحة الرئيسية تعمل";
  }

  else if (page === "employees") {
    app.innerHTML = "🔥 الموظفين تعمل";
  }

  else if (page === "requests") {
    app.innerHTML = "🔥 الطلبات تعمل";
  }

  else {
    app.innerHTML = "صفحة أخرى";
  }
};

/* =========================
   START
========================= */

navigate("home");

</script>

</body>
</html>
