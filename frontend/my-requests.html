<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>طلباتي</title><link rel="stylesheet" href="./css/app.css?v=clean-103"></head><body class="apple-system-ui"><div class="app-layout"><aside class="sidebar"><div class="sidebar-logo"><span class="brand-mark">HR</span><span>نظام الموارد البشرية</span></div><nav class="sidebar-menu"></nav></aside><main class="main-content page-shell"><header class="topbar"><div class="header-title-area"><h1>طلباتي</h1><p>إنشاء ومتابعة طلباتك فقط.</p></div><button id="logoutBtn" class="logout-btn">تسجيل الخروج</button></header><section class="page-header"><div><span class="page-kicker">بوابة الموظف</span><h1>طلباتي</h1><p>لا يظهر هنا أي طلب لموظف آخر.</p></div></section><section class="content-card"><div class="section-header"><div><h2>طلباتي السابقة</h2><p>جدول مختصر لطلباتك.</p></div></div><div class="table-scroll"><table><thead><tr><th>التاريخ</th><th>نوع الطلب</th><th>الحالة</th><th>عرض</th></tr></thead><tbody id="myRequestsBody"><tr><td colspan="4">جاري التحميل...</td></tr></tbody></table></div><div id="requestDetailsBox" class="details-grid" style="margin-top:14px"></div></section><section class="content-card"><div class="section-header"><div><h2>تقديم طلب جديد</h2></div></div><form id="requestForm" class="form-grid two"><div class="field-shell full-width"><label class="field-label">نوع الطلب</label><select id="requestType"><option value="leave">طلب إجازة</option><option value="exit">طلب مغادرة</option><option value="advance">طلب سلفة</option><option value="complaint">شكوى</option><option value="custom">طلب مخصص</option></select></div><div id="dynamicFields" class="form-grid two full-width"></div><div class="field-shell full-width"><label class="field-label">السبب</label><input id="reqReason"></div><div class="field-shell full-width"><label class="field-label">تفاصيل إضافية</label><textarea id="reqDetails"></textarea></div><div class="form-actions full-width"><button type="submit">إرسال الطلب</button></div></form><p id="requestMsg" class="inline-message"></p></section></main></div><script src="./js/navigation-config.js?v=clean-103"></script><script src="./js/auth-guard.js?v=clean-103"></script><script>function el(id){return document.getElementById(id)}function d(v){return v?String(v).slice(0,10):'-'}function st(v){return {pending:'قيد الانتظار',approved:'موافق عليه',rejected:'مرفوض',cancelled:'ملغي',needs_info:'يحتاج معلومات',draft:'مسودة'}[v]||v||'-'}function ty(v){return {leave:'طلب إجازة',exit:'طلب مغادرة',advance:'طلب سلفة',complaint:'شكوى',custom:'طلب مخصص',resignation:'طلب استقالة'}[v]||v||'-'}function det(l,v){return '<div class="detail-item"><span class="detail-label">'+l+'</span><span class="detail-value">'+(v||'-')+'</span></div>'}async function callApi(path,opt={}){const r=await fetch(API_BASE_URL+path,{...opt,headers:{Authorization:'Bearer '+token,'Content-Type':'application/json',...(opt.headers||{})}});const j=await r.json().catch(()=>({}));if(!r.ok)throw new Error(j.error||'فشل الاتصال');return j}function fields(t){if(t==='leave')return '<div class="field-shell"><label class="field-label">نوع الإجازة</label><select id="reqLeaveType"><option value="annual">سنوية</option><option value="sick">مرضية</option><option value="emergency">طارئة</option><option value="unpaid">بدون راتب</option></select></div><div class="field-shell"><label class="field-label">من تاريخ</label><input type="date" id="reqStart"></div><div class="field-shell"><label class="field-label">إلى تاريخ</label><input type="date" id="reqEnd"></div>';if(t==='exit')return '<div class="field-shell"><label class="field-label">نوع المغادرة</label><select id="reqExitType"><option value="personal">شخصية</option><option value="work">عمل</option><option value="medical">طبية</option></select></div><div class="field-shell"><label class="field-label">التاريخ</label><input type="date" id="reqExitDate"></div><div class="field-shell"><label class="field-label">وقت المغادرة</label><input type="time" id="reqExitTime"></div><div class="field-shell"><label class="field-label">وقت العودة</label><input type="time" id="reqReturnTime"></div>';if(t==='advance')return '<div class="field-shell"><label class="field-label">المبلغ</label><input type="number" id="reqAmount" min="0" step="0.01"></div><div class="field-shell"><label class="field-label">طريقة الخصم</label><select id="reqDeduction"><option value="one_time">مرة واحدة</option><option value="installments">أقساط</option></select></div><div class="field-shell"><label class="field-label">عدد الأقساط</label><input type="number" id="reqInstallments" min="1" value="1"></div><div class="field-shell"><label class="field-label">بداية الخصم</label><input type="month" id="reqStartMonth"></div>';return '<div class="field-shell full-width"><label class="field-label">عنوان الطلب</label><input id="reqTitle"></div>'}function payload(t){const reason=el('reqReason')?.value||'';const notes=el('reqDetails')?.value||'';if(t==='leave')return {leave_type:el('reqLeaveType')?.value||'annual',start_date:el('reqStart')?.value,end_date:el('reqEnd')?.value,reason,notes};if(t==='exit')return {exit_type:el('reqExitType')?.value||'personal',exit_date:el('reqExitDate')?.value,exit_time:el('reqExitTime')?.value,return_time:el('reqReturnTime')?.value,reason,notes};if(t==='advance')return {amount:Number(el('reqAmount')?.value||0),deduction_method:el('reqDeduction')?.value||'one_time',installments_count:Number(el('reqInstallments')?.value||1),deduction_start_month:el('reqStartMonth')?.value,reason,notes};return {title:el('reqTitle')?.value||ty(t),reason,details:notes,notes}}async function loadRows(){let rows=[];let errors=[];try{rows=(await callApi('/employee-portal/requests')).requests||[]}catch(e){errors.push(e.message)}if(!rows.length){try{const j=await callApi('/leaves');rows=j.requests||j.leaves||[]}catch(e){errors.push(e.message)}}return {rows,errors}}async function renderRequests(extraRow){const body=el('myRequestsBody');try{let {rows,errors}=await loadRows();if(extraRow&&!rows.some(r=>String(r.id)===String(extraRow.id)))rows=[extraRow,...rows];window.__myRequests=rows;if(!rows.length){body.innerHTML='<tr><td colspan="4">لا توجد طلبات لهذا الحساب'+(errors.length?' — '+errors.join(' / '):'')+'</td></tr>';return}body.innerHTML=rows.map(r=>'<tr><td>'+d(r.created_at||r.submitted_at)+'</td><td>'+ty(r.request_type)+'</td><td>'+st(r.status)+'</td><td><button class="secondary-btn small-btn" type="button" onclick="showReq('+r.id+')">عرض</button></td></tr>').join('')}catch(e){body.innerHTML='<tr><td colspan="4">'+e.message+'</td></tr>'}}function showReq(id){const r=(window.__myRequests||[]).find(x=>Number(x.id)===Number(id));const data=r?.request_data||{};el('requestDetailsBox').innerHTML=det('نوع الطلب',ty(r?.request_type))+det('الحالة',st(r?.status))+det('التاريخ',d(r?.created_at||r?.submitted_at))+det('التفاصيل',Object.entries(data).map(([k,v])=>k+': '+v).join(' | ')||'-')}window.showReq=showReq;async function start(){if(typeof loadLoggedUser==='function')await loadLoggedUser();const type=el('requestType');const box=el('dynamicFields');box.innerHTML=fields(type.value);type.onchange=()=>box.innerHTML=fields(type.value);await renderRequests();el('requestForm').onsubmit=async ev=>{ev.preventDefault();const msg=el('requestMsg');msg.textContent='جاري إرسال الطلب...';msg.className='inline-message';try{const body={request_type:type.value,status:'pending',request_data:payload(type.value)};const j=await callApi('/leaves',{method:'POST',body:JSON.stringify(body)});msg.textContent=j.message||'تم إرسال الطلب';msg.className='inline-message success-message';ev.target.reset();box.innerHTML=fields(type.value);await renderRequests(j.request)}catch(e){msg.textContent=e.message;msg.className='inline-message error-message'}}}start();</script></body></html>
