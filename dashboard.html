<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR SaaS Dashboard</title>

  <link rel="stylesheet" href="./styles/main.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">

    <h2>🏢 HR System</h2>

    <div id="userBox"></div>

    <hr style="opacity:0.2"/>

    <div class="menu-item" onclick="show('home')">🏠 الرئيسية</div>
    <div class="menu-item" onclick="show('employees')">👥 الموظفين</div>
    <div class="menu-item" onclick="show('requests')">📄 الطلبات</div>
    <div class="menu-item" onclick="show('attendance')">⏱ الحضور</div>
    <div class="menu-item" onclick="show('payroll')">💰 الرواتب</div>
    <div class="menu-item" onclick="show('announcements')">📢 الإعلانات</div>
    <div class="menu-item" onclick="show('audit')">🧾 السجل</div>

    <div class="menu-item" onclick="logout()">🚪 تسجيل خروج</div>

  </div>

  <!-- Content -->
  <div class="content">

    <div id="app">جاري التحميل...</div>

  </div>

</div>

<!-- =========================
     Scripts (Core System)
========================= -->

<script type="module">

import { requireAuth, logout } from "./core/auth.js";
import { state, loadUser } from "./core/state.js";

import { renderEmployees } from "./modules/employees.js";
import { renderRequests } from "./modules/requests.js";
import { renderAttendance } from "./modules/attendance.js";
import { renderPayrollUI } from "./modules/payroll.js";
import { renderAnnouncements } from "./modules/announcements.js";
import { renderAudit } from "./modules/audit.js";

import { listenCollection } from "./core/realtime.js";

/* =========================
   Init User
========================= */

const user = requireAuth();

loadUser();

/* =========================
   Sidebar User Info
========================= */

document.getElementById("userBox").innerHTML = `
  <div class="card">
    <b>${user.name}</b>
    <p>${user.role}</p>
  </div>
`;

/* =========================
   Router (Simple SPA)
========================= */

window.show = async function(page) {

  const app = document.getElementById("app");

  app.innerHTML = "جاري التحميل...";

  if (page === "home") {
    app.innerHTML = "<h2>مرحباً 👋 في نظام الموارد البشرية</h2>";
  }

  if (page === "employees") {
    await renderEmployees("app");
  }

  if (page === "requests") {
    await renderRequests("app", user);
  }

  if (page === "attendance") {
    await renderAttendance("app");
  }

  if (page === "payroll") {
    await renderPayrollUI("app");
  }

  if (page === "announcements") {
    await renderAnnouncements("app", user.employeeId);
  }

  if (page === "audit") {
    await renderAudit("app");
  }

};

window.logout = logout;

/* =========================
   Default Page
========================= */

show("home");

/* =========================
   Live Updates (Realtime Hook)
========================= */

listenCollection("requests", () => {
  console.log("Requests updated 🔄");
});

listenCollection("users", () => {
  console.log("Employees updated 🔄");
});

</script>

</body>
</html>
