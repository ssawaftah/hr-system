<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التقارير</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">HR System V2</div>
      <nav class="sidebar-menu">
        <a href="./dashboard.html" class="" data-role-link="dashboard">لوحة التحكم</a>
        <a href="./users.html" class="" data-role-link="users">المستخدمون</a>
        <a href="./departments.html" class="" data-role-link="departments">الأقسام</a>
        <a href="./employees.html" class="" data-role-link="employees">الموظفون</a>
        <a href="./attendance.html" class="" data-role-link="attendance">الحضور</a>
        <a href="./leaves.html" class="" data-role-link="leaves">الإجازات</a>
        <a href="./salaries.html" class="" data-role-link="salaries">الرواتب</a>
        <a href="./reports.html" class="active" data-role-link="reports">التقارير</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>التقارير</h1>
          <p id="pageSubtitle">تقارير تشغيلية ومالية حسب صلاحيات المستخدم</p>
        </div>
        <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
      </header>

      <section class="content-card">
        <h2>تقرير الحضور حسب الحالة</h2>
        <button id="exportAttendanceSummary" class="secondary-btn">تصدير CSV</button>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>الحالة</th>
                <th>العدد</th>
              </tr>
            </thead>
            <tbody id="attendanceSummaryBody"></tbody>
          </table>
        </div>
      </section>

      <section class="content-card" id="salaryReportSection" data-admin-only="true">
        <h2>تقرير الرواتب حسب الشهر</h2>
        <button id="exportSalarySummary" class="secondary-btn">تصدير CSV</button>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>الشهر</th>
                <th>عدد السجلات</th>
                <th>إجمالي الصافي</th>
              </tr>
            </thead>
            <tbody id="salarySummaryBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="./js/auth-guard.js"></script>
  <script src="./js/reports.js"></script>
</body>
</html>
