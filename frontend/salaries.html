<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة الرواتب</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">HR System</div>
      <nav class="sidebar-menu">
        <a href="./dashboard.html" class="" data-role-link="dashboard">لوحة التحكم</a>
<a href="./users.html" class="" data-role-link="users">المستخدمون</a>
<a href="./departments.html" class="" data-role-link="departments">الأقسام</a>
<a href="./employees.html" class="" data-role-link="employees">الموظفون</a>
<a href="./attendance.html" class="" data-role-link="attendance">الحضور</a>
<a href="./salaries.html" class="active" data-role-link="salaries">الرواتب</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>إدارة الرواتب</h1>
          <p id="pageSubtitle">نظام موارد بشرية محلي</p>
        </div>
        <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
      </header>


<section class="content-card">
  <h2>إضافة سجل راتب</h2>

  <form id="salaryForm" class="form-grid">
    <select id="employee_id" required>
      <option value="">اختر الموظف</option>
    </select>
    <input type="month" id="salary_month" required />
    <input type="number" id="basic_salary" placeholder="الراتب الأساسي" min="0" step="0.01" />
    <input type="number" id="allowances" placeholder="البدلات" min="0" step="0.01" />
    <input type="number" id="deductions" placeholder="الخصومات" min="0" step="0.01" />
    <select id="status">
      <option value="draft">مسودة</option>
      <option value="approved">معتمد</option>
      <option value="paid">مدفوع</option>
    </select>
    <button type="submit">حفظ الراتب</button>
  </form>

  <p id="formMessage"></p>
</section>

<section class="table-container">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>الموظف</th>
        <th>الشهر</th>
        <th>أساسي</th>
        <th>بدلات</th>
        <th>خصومات</th>
        <th>الصافي</th>
        <th>الحالة</th>
        <th>إجراءات</th>
      </tr>
    </thead>
    <tbody id="salariesTableBody"></tbody>
  </table>
</section>

    </main>
  </div>
  <script src="./js/auth-guard.js"></script>
  <script src="./js/salaries.js"></script>
</body>
</html>
