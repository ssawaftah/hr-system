<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background:#f5f5f7;
  padding:20px;
}

.card {
  background:white;
  padding:15px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
const user = JSON.parse(sessionStorage.getItem("user"));

if (!user) {
  window.location.href = "index.html";
}

const app = document.getElementById("app");

app.innerHTML = `
  <h2>مرحباً ${user.name}</h2>
  <p>رقم الموظف: ${user.employeeId}</p>
  <p>الدور: ${user.role}</p>

  <div class="card">
    <h3>القائمة</h3>
    <ul>
      ${user.role === "admin" ? `
        <li>إدارة الموظفين</li>
        <li>الطلبات</li>
        <li>الإعلانات</li>
      ` : `
        <li>الإعلانات</li>
        <li>طلب إجازة</li>
        <li>طلب مغادرة</li>
      `}
    </ul>
  </div>
`;
</script>

</body>
</html>
