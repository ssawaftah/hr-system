<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body{margin:0;font-family:Arial;direction:rtl;background:#f5f5f7}
.container{display:flex;height:100vh}
.sidebar{width:220px;background:#1d1d1f;color:#fff;padding:15px}
.menu{padding:10px;margin:5px 0;background:#333;cursor:pointer;border-radius:8px}
.content{flex:1;padding:20px}
.card{background:#fff;padding:15px;margin:10px 0;border-radius:10px}
.hidden{display:none}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
<h3 id="name"></h3>
<div class="menu" onclick="show('home')">الرئيسية</div>
<div class="menu" onclick="show('employees')">الموظفين</div>
<div class="menu" onclick="show('requests')">الطلبات</div>
<div class="menu" onclick="show('ann')">الإعلانات</div>
<div class="menu" onclick="logout()">خروج</div>
</div>

<div class="content">

<div id="home">
<h2>لوحة التحكم</h2>
<div class="card" id="info"></div>
</div>

<div id="employees" class="hidden">
<h2>الموظفين</h2>
<div id="empBox"></div>
</div>

<div id="requests" class="hidden">
<h2>الطلبات</h2>
<div class="card">نظام الطلبات قريباً</div>
</div>

<div id="ann" class="hidden">
<h2>الإعلانات</h2>
<div class="card">الإعلانات قريباً</div>
</div>

</div>

</div>

<script type="module">

const user = JSON.parse(sessionStorage.getItem("user"));

if(!user) location.href="index.html";

document.getElementById("name").innerText = user.name;

document.getElementById("info").innerHTML = `
<p>الاسم: ${user.name}</p>
<p>الرقم: ${user.employeeId}</p>
<p>الدور: ${user.role}</p>
`;

window.show = function(id){
document.querySelectorAll(".content > div").forEach(d=>d.classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
};

window.logout = function(){
sessionStorage.clear();
location.href="index.html";
};

</script>

</body>
</html>
