<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HR System</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f5f5f7;
  text-align: center;
}

.box {
  margin-top: 100px;
}

input {
  display:block;
  margin:10px auto;
  padding:10px;
  width:80%;
}

button {
  padding:10px 20px;
  background:#0071e3;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="box">
  <h2>تسجيل الدخول</h2>

  <input id="id" placeholder="رقم الموظف أو البريد">
  <input id="pass" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfC1rS6ONG0F0NyNxsPHIbgmQK3cbcmHc",
  authDomain: "hr-steel-factory.firebaseapp.com",
  projectId: "hr-steel-factory",
  storageBucket: "hr-steel-factory.firebasestorage.app",
  messagingSenderId: "268695668396",
  appId: "1:268695668396:web:39c73c8bd8e19ce591c109"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.login = async function () {

  const email = document.getElementById("id").value;
  const password = document.getElementById("pass").value;

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);

    const user = userCredential.user;

    alert("تم تسجيل الدخول بنجاح 🚀");

    // نخزن الجلسة
    sessionStorage.setItem("user", JSON.stringify({
      uid: user.uid,
      email: user.email
    }));

    // تحويل للداشبورد
    window.location.href = "dashboard.html";

  } catch (error) {
    alert("خطأ في تسجيل الدخول: " + error.message);
  }
};
</script>

</body>
</html>
