<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HR Login</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f5f5f7;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.box {
  background:white;
  padding:20px;
  border-radius:12px;
  width:300px;
}

input {
  width:100%;
  padding:10px;
  margin:8px 0;
}

button {
  width:100%;
  padding:10px;
  background:#0071e3;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="box">
  <h3>تسجيل الدخول</h3>

  <input id="id" placeholder="رقم الموظف">
  <input id="pass" type="password" placeholder="كلمة السر">

  <button onclick="login()">دخول</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfC1rS6ONG0F0NyNxsPHIbgmQK3cbcmHc",
  authDomain: "hr-steel-factory.firebaseapp.com",
  projectId: "hr-steel-factory",
  storageBucket: "hr-steel-factory.firebasestorage.app",
  messagingSenderId: "268695668396",
  appId: "1:268695668396:web:39c73c8bd8e19ce591c109"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function () {

  const id = document.getElementById("id").value;
  const pass = document.getElementById("pass").value;

  try {

    const q = query(
      collection(db, "users"),
      where("employeeId", "==", id),
      where("password", "==", pass)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      alert("بيانات غير صحيحة ❌");
      return;
    }

    const user = snap.docs[0].data();

    sessionStorage.setItem("user", JSON.stringify(user));

    window.location.href = "dashboard.html";

  } catch (e) {
    alert("خطأ: " + e.message);
  }
};

</script>

</body>
</html>
