<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>طلباتي السابقة</title>
  <link rel="stylesheet" href="./css/app.css?v=manual-1" />

  <style>
    body {
      background: #f7f9fc;
    }

    .requests-list-page {
      max-width: 980px;
      margin: 0 auto;
      padding-bottom: 90px;
    }

    .requests-filter-card {
      background: #fff;
      border-radius: 24px;
      padding: 22px;
      margin: 18px 0 26px;
      box-shadow: 0 10px 35px rgba(20, 32, 60, 0.10);
      border: 1px solid #e7ebf3;
    }

    .requests-filter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 18px;
    }

    .requests-filter-grid label {
      display: block;
      color: #8aa7d8;
      font-weight: 900;
      font-size: 22px;
      margin-bottom: 10px;
    }

    .requests-filter-grid select {
      width: 100%;
      border: 3px solid #4f9af4;
      border-radius: 18px;
      padding: 15px 16px;
      font-size: 22px;
      background: #fff;
      outline: none;
    }

    .show-results-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 18px;
      background: linear-gradient(135deg, #4f9af4, #2f86ee);
      color: #fff;
      font-weight: 900;
      font-size: 24px;
      cursor: pointer;
    }

    .requests-table-wrap {
      background: #fff;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid #222;
      box-shadow: 0 8px 26px rgba(0, 0, 0, 0.07);
    }

    .requests-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      table-layout: fixed;
    }

    .requests-table th,
    .requests-table td {
      border: 2px solid #333;
      padding: 13px 10px;
      text-align: center;
      font-size: 21px;
      vertical-align: middle;
      word-break: break-word;
    }

    .requests-table th {
      background: #f7fbff;
      font-weight: 900;
    }

    .view-request-btn {
      border: none;
      background: #4f9af4;
      color: #fff;
      border-radius: 10px;
      padding: 10px 15px;
      font-size: 20px;
      cursor: pointer;
      font-weight: 900;
    }

    .empty-box {
      background: #fff;
      border-radius: 20px;
      padding: 26px;
      text-align: center;
      font-size: 20px;
      color: #777;
      border: 1px solid #e7ebf3;
    }

    .request-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(18, 20, 28, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .request-modal.is-open {
      display: flex;
    }

    .request-modal-card {
      width: min(720px, 100%);
      max-height: 86vh;
      overflow: auto;
      background: #fff;
      border-radius: 28px;
      padding: 22px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
    }

    .request-modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
    }

    .request-modal-head h2 {
      margin: 0;
      font-size: 26px;
      font-weight: 900;
    }

    .close-modal-btn {
      border: none;
      background: #f1f3f8;
      border-radius: 14px;
      padding: 11px 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .details-grid-local {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-box-local {
      background: #f8faff;
      border: 1px solid #e4e9f4;
      border-radius: 16px;
      padding: 14px;
    }

    .detail-box-local span {
      display: block;
      color: #777;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .detail-box-local strong {
      display: block;
      font-size: 18px;
      color: #111;
      line-height: 1.7;
    }

    @media (max-width: 760px) {
      .requests-list-page {
        padding: 0 10px 90px;
      }

      .requests-filter-grid {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .requests-filter-grid label {
        font-size: 18px;
      }

      .requests-filter-grid select {
        font-size: 19px;
        padding: 13px;
      }

      .show-results-btn {
        font-size: 21px;
      }

      .requests-table th,
      .requests-table td {
        font-size: 17px;
        padding: 10px 6px;
      }

      .view-request-btn {
        font-size: 16px;
        padding: 8px 11px;
      }

      .details-grid-local {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body class="apple-system-ui">
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="brand-mark">HR</span>
        <span>نظام الموارد البشرية</span>
      </div>
      <nav class="sidebar-menu"></nav>
    </aside>

    <main class="main-content page-shell requests-list-page">
      <header class="topbar">
        <div class="header-title-area">
          <h1>طلباتي السابقة</h1>
          <p>عرض ومتابعة جميع طلباتك.</p>
        </div>
        <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
      </header>

      <section class="requests-filter-card">
        <div class="requests-filter-grid">
          <div>
            <label for="yearFilter">السنوات</label>
            <select id="yearFilter"></select>
          </div>

          <div>
            <label for="statusFilter">الحالة</label>
            <select id="statusFilter">
              <option value="all">الكل</option>
              <option value="pending">قيد الانتظار</option>
              <option value="approved">موافق عليه</option>
              <option value="rejected">مرفوض</option>
              <option value="cancelled">ملغي</option>
              <option value="needs_info">يحتاج معلومات</option>
              <option value="draft">مسودة</option>
            </select>
          </div>
        </div>

        <button id="showResultsBtn" class="show-results-btn">عرض النتائج</button>
      </section>

      <section id="requestsResultBox">
        <div class="empty-box">جاري تحميل الطلبات...</div>
      </section>
    </main>
  </div>

  <div id="requestDetailsModal" class="request-modal">
    <div class="request-modal-card">
      <div class="request-modal-head">
        <h2>تفاصيل الطلب</h2>
        <button id="closeDetailsModal" class="close-modal-btn">إغلاق</button>
      </div>

      <div id="requestDetailsContent" class="details-grid-local"></div>
    </div>
  </div>

  <script src="./js/navigation-config.js?v=manual-1"></script>
  <script src="./js/auth-guard.js?v=manual-1"></script>

  <script>
    const $ = (id) => document.getElementById(id);
    const LOCAL_KEY = "hr_employee_requests_local_echo_v1";

    let allRequests = [];

    const typeLabels = {
      leave: "الإجازات",
      exit: "المغادرة",
      overtime: "العمل الإضافي",
      advance: "السلف",
      complaint: "الشكاوى",
      resignation: "الاستقالة",
      custom_allowance: "المخصصات",
      custom: "طلبات أخرى"
    };

    const statusLabels = {
      pending: "قيد الانتظار",
      approved: "موافق عليه",
      rejected: "مرفوض",
      cancelled: "ملغي",
      needs_info: "يحتاج معلومات",
      draft: "مسودة"
    };

    function apiBase() {
      return window.API_BASE_URL || "https://hr-system-backend-dxj2.onrender.com/api";
    }

    function authToken() {
      return window.token || localStorage.getItem("token");
    }

    async function api(path, options = {}) {
      const response = await fetch(apiBase() + path, {
        ...options,
        headers: {
          Authorization: "Bearer " + authToken(),
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });

      const data = await response.json().catch(() => ({}));

      if (!response.ok) {
        throw new Error(data.error || "فشل الاتصال بالسيرفر");
      }

      return data;
    }

    function formatDate(value) {
      return value ? String(value).slice(0, 10) : "-";
    }

    function safe(value, fallback = "-") {
      return value === undefined || value === null || value === "" ? fallback : String(value);
    }

    function readLocalRequests() {
      try {
        return JSON.parse(localStorage.getItem(LOCAL_KEY) || "[]");
      } catch (_) {
        return [];
      }
    }

    function requestYear(row) {
      const raw = row.created_at || row.submitted_at || "";
      const year = String(raw).slice(0, 4);
      return /^\d{4}$/.test(year) ? year : String(new Date().getFullYear());
    }

    function requestType(row) {
      return row.request_type || "custom";
    }

    function requestStatus(row) {
      return row.status || "pending";
    }

    function requestDetailsText(row) {
      const data = row.request_data || {};
      const parts = [];

      Object.entries(data).forEach(([key, value]) => {
        if (value !== undefined && value !== null && value !== "") {
          parts.push(`${key}: ${value}`);
        }
      });

      return parts.join(" | ") || row.request_title || "لا توجد تفاصيل إضافية";
    }

    async function fetchRequests() {
      let serverRows = [];
      const errors = [];

      try {
        const data = await api("/employee-portal/requests");
        serverRows = data.requests || [];
      } catch (error) {
        errors.push("/employee-portal/requests: " + error.message);
      }

      if (!serverRows.length) {
        try {
          const data = await api("/leaves");
          serverRows = data.requests || data.leaves || [];
        } catch (error) {
          errors.push("/leaves: " + error.message);
        }
      }

      const merged = [...readLocalRequests(), ...serverRows];
      const seen = new Set();

      allRequests = merged.filter((row) => {
        const key = String(row.id || row.local_id || `${row.request_type}-${row.created_at}`);
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      return errors;
    }

    function fillYearFilter() {
      const yearFilter = $("yearFilter");
      const currentYear = new Date().getFullYear();

      const years = new Set([String(currentYear)]);

      allRequests.forEach((row) => {
        years.add(requestYear(row));
      });

      const sortedYears = Array.from(years).sort((a, b) => Number(b) - Number(a));

      yearFilter.innerHTML = sortedYears.map((year) => {
        return `<option value="${year}">${year}</option>`;
      }).join("");

      yearFilter.value = String(currentYear);
    }

    function filterRequests() {
      const selectedYear = $("yearFilter").value;
      const selectedStatus = $("statusFilter").value;

      return allRequests.filter((row) => {
        const matchesYear = requestYear(row) === selectedYear;
        const matchesStatus = selectedStatus === "all" || requestStatus(row) === selectedStatus;

        return matchesYear && matchesStatus;
      });
    }

    function renderRequestsTable() {
      const box = $("requestsResultBox");
      const rows = filterRequests();

      if (!rows.length) {
        box.innerHTML = `<div class="empty-box">لا توجد طلبات ضمن الفلترة الحالية</div>`;
        return;
      }

      box.innerHTML = `
        <div class="requests-table-wrap">
          <table class="requests-table">
            <thead>
              <tr>
                <th>التاريخ</th>
                <th>النوع</th>
                <th>الحالة</th>
                <th>عرض</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((row, index) => `
                <tr>
                  <td>${formatDate(row.created_at || row.submitted_at)}</td>
                  <td>${typeLabels[requestType(row)] || safe(row.request_title, "طلب")}</td>
                  <td>${statusLabels[requestStatus(row)] || requestStatus(row)}</td>
                  <td>
                    <button class="view-request-btn" type="button" data-row-index="${index}">
                      💬
                    </button>
                  </td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `;

      box.querySelectorAll("[data-row-index]").forEach((button) => {
        button.addEventListener("click", () => {
          const row = rows[Number(button.dataset.rowIndex)];
          showDetails(row);
        });
      });
    }

    function detailBox(label, value) {
      return `
        <div class="detail-box-local">
          <span>${label}</span>
          <strong>${safe(value)}</strong>
        </div>
      `;
    }

    function showDetails(row) {
      $("requestDetailsContent").innerHTML = [
        detailBox("نوع الطلب", typeLabels[requestType(row)] || row.request_title || "طلب"),
        detailBox("الحالة", statusLabels[requestStatus(row)] || requestStatus(row)),
        detailBox("التاريخ", formatDate(row.created_at || row.submitted_at)),
        detailBox("العنوان", row.request_title || "-"),
        detailBox("التفاصيل", requestDetailsText(row))
      ].join("");

      $("requestDetailsModal").classList.add("is-open");
    }

    async function initPage() {
      if (typeof window.loadLoggedUser === "function") {
        await window.loadLoggedUser();
      }

      const errors = await fetchRequests();
      fillYearFilter();
      renderRequestsTable();

      if (errors.length && !allRequests.length) {
        $("requestsResultBox").innerHTML = `
          <div class="empty-box">
            لا توجد طلبات ظاهرة.<br>
            ${errors.join("<br>")}
          </div>
        `;
      }

      $("showResultsBtn").addEventListener("click", renderRequestsTable);

      $("closeDetailsModal").addEventListener("click", () => {
        $("requestDetailsModal").classList.remove("is-open");
      });
    }

    initPage();
  </script>
</body>
</html>
