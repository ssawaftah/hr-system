<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة المستخدمين</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">HR System</div>
      <nav class="sidebar-menu">
        <a href="./dashboard.html" class="" data-role-link="dashboard">لوحة التحكم</a>
<a href="./users.html" class="active" data-role-link="users">المستخدمون</a>
<a href="./departments.html" class="" data-role-link="departments">الأقسام</a>
<a href="./employees.html" class="" data-role-link="employees">الموظفون</a>
<a href="./attendance.html" class="" data-role-link="attendance">الحضور</a>
<a href="./salaries.html" class="" data-role-link="salaries">الرواتب</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>إدارة المستخدمين</h1>
          <p id="pageSubtitle">نظام موارد بشرية محلي</p>
        </div>
        <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
      </header>


<section class="content-card" id="createUserSection">
  <h2>إنشاء مستخدم جديد</h2>

  <form id="createUserForm" class="form-grid">
    <input type="text" id="full_name" placeholder="الاسم الكامل" required />
    <input type="email" id="email" placeholder="البريد الإلكتروني" required />
    <input type="password" id="password" placeholder="كلمة المرور" required />

    <select id="role" required>
      <option value="">اختر الدور</option>
      <option value="admin">Admin</option>
      <option value="hr">HR</option>
      <option value="employee">Employee</option>
    </select>

    <button type="submit">إنشاء المستخدم</button>
  </form>

  <p id="formMessage"></p>
</section>

<section class="table-container">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>الاسم</th>
        <th>البريد الإلكتروني</th>
        <th>الدور</th>
        <th>الحالة</th>
      </tr>
    </thead>
    <tbody id="usersTableBody"></tbody>
  </table>
</section>

    </main>
  </div>
  <script src="./js/auth-guard.js"></script>
  <script src="./js/users.js"></script>
</body>
</html>
