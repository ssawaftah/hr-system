<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>HR System</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f5f5f7;
  text-align: center;
}

.box {
  margin-top: 100px;
}

input {
  display:block;
  margin:10px auto;
  padding:10px;
  width:80%;
}

button {
  padding:10px 20px;
  background:#0071e3;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="box">
  <h2>تسجيل الدخول</h2>

  <input id="id" placeholder="رقم الموظف أو البريد">
  <input id="pass" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCfC1rS6ONG0F0NyNxsPHIbgmQK3cbcmHc",
  authDomain: "hr-steel-factory.firebaseapp.com",
  projectId: "hr-steel-factory",
  storageBucket: "hr-steel-factory.firebasestorage.app",
  messagingSenderId: "268695668396",
  appId: "1:268695668396:web:39c73c8bd8e19ce591c109"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.login = async function () {

  const id = document.getElementById("id").value;
  const pass = document.getElementById("pass").value;

  try {

    const q = query(
      collection(db, "users"),
      where("employeeId", "==", id),
      where("password", "==", pass)
    );

    const snap = await getDocs(q);

    if (snap.empty) {
      alert("بيانات غير صحيحة ❌");
      return;
    }

    const user = snap.docs[0].data();

    // حفظ الجلسة
    sessionStorage.setItem("user", JSON.stringify(user));

    alert("مرحباً " + user.name + " 👋");

    // تحويل حسب الدور
    if (user.role === "admin") {
      window.location.href = "dashboard.html?role=admin";
    } else {
      window.location.href = "dashboard.html?role=employee";
    }

  } catch (err) {
    alert("خطأ في النظام: " + err.message);
  }
};
</script>

</body>
</html>
