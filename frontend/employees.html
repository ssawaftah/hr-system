<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إدارة الموظفين</title>
  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/employees.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">HR System V2</div>
      <nav class="sidebar-menu">
        <a href="./dashboard.html" class="" data-role-link="dashboard">لوحة التحكم</a>
        <a href="./users.html" class="" data-role-link="users">المستخدمون</a>
        <a href="./departments.html" class="" data-role-link="departments">الأقسام</a>
        <a href="./employees.html" class="active" data-role-link="employees">الموظفون</a>
        <a href="./attendance.html" class="" data-role-link="attendance">الحضور</a>
        <a href="./leaves.html" class="" data-role-link="leaves">الإجازات</a>
        <a href="./salaries.html" class="" data-role-link="salaries">الرواتب</a>
        <a href="./reports.html" class="" data-role-link="reports">التقارير</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div>
          <h1>إدارة الموظفين</h1>
          <p id="pageSubtitle">إضافة، تعديل، بحث، وفلترة بيانات الموظفين</p>
        </div>
        <button id="logoutBtn" class="logout-btn">تسجيل الخروج</button>
      </header>

      <section class="content-card">
        <h2 id="employeeFormTitle">إضافة موظف</h2>
        <form id="employeeForm" class="form-grid employee-form-grid">
          <input type="hidden" id="employeeId" />
          <input type="text" id="full_name" placeholder="الاسم الكامل" required />
          <input type="text" id="national_id" placeholder="رقم الموظف" required />
          <input type="text" id="phone" placeholder="رقم الهاتف" />
          <input type="email" id="email" placeholder="البريد الإلكتروني" />
          <input type="text" id="address" placeholder="العنوان" />
          <input type="text" id="job_title" placeholder="المسمى الوظيفي" />
          <select id="department_id"><option value="">اختر القسم الأساسي</option></select>
          <select id="extra_department_ids" multiple size="4" title="الأقسام الإضافية"></select>
          <input type="date" id="hire_date" />
          <select id="employment_type">
            <option value="full_time">دوام كامل</option>
            <option value="part_time">دوام جزئي</option>
            <option value="contract">عقد</option>
          </select>
          <select id="is_active">
            <option value="true">نشط</option>
            <option value="false">غير نشط</option>
          </select>
          <button type="submit">حفظ</button>
          <button type="button" id="cancelEditBtn" class="secondary-btn">إلغاء التعديل</button>
        </form>
        <p id="formMessage" class="inline-message"></p>
      </section>

      <section class="table-container">
        <div class="section-header">
          <div>
            <h2>قائمة الموظفين</h2>
            <p id="employeesCountText">جاري تحميل البيانات...</p>
          </div>
          <div class="actions-row">
            <button id="refreshEmployeesBtn" class="secondary-btn">تحديث</button>
            <button id="exportEmployeesBtn" class="secondary-btn">تصدير CSV</button>
          </div>
        </div>
        <div class="filters-grid">
          <input type="text" id="employeeSearchInput" placeholder="بحث بالاسم، رقم الموظف، الهاتف، البريد، أو المسمى" />
          <select id="departmentFilter"><option value="">كل الأقسام</option></select>
          <select id="statusFilter">
            <option value="">كل الحالات</option>
            <option value="active">نشط</option>
            <option value="inactive">غير نشط</option>
          </select>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>الاسم</th>
                <th>الهاتف</th>
                <th>البريد</th>
                <th>المسمى</th>
                <th>القسم الأساسي</th>
                <th>الأقسام الإضافية</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="employeesTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>
  <script src="./js/auth-guard.js"></script>
  <script src="./js/employees.js"></script>
</body>
</html>
