<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  background: #f5f5f7;
  text-align: center;
}

.card {
  background: white;
  padding: 20px;
  margin: 20px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h2>لوحة التحكم</h2>

<div class="card" id="userBox"></div>

<script>
const user = JSON.parse(sessionStorage.getItem("user"));

if (!user) {
  window.location.href = "index.html";
}

document.body.innerHTML = `
  <h2>مرحباً ${user.name}</h2>
  <p>الدور: ${user.role}</p>

  <div id="panel"></div>
`;

// لوحة حسب الدور
if (user.role === "admin") {
  document.getElementById("panel").innerHTML = `
    <h3>لوحة المدير 🔥</h3>
    <ul>
      <li>إدارة الموظفين</li>
      <li>الطلبات</li>
      <li>الإعلانات</li>
    </ul>
  `;
} else {
  document.getElementById("panel").innerHTML = `
    <h3>لوحة الموظف 👷</h3>
    <ul>
      <li>الإعلانات</li>
      <li>طلب إجازة</li>
      <li>طلب مغادرة</li>
    </ul>
  `;
}
</script>

</body>
</html>
